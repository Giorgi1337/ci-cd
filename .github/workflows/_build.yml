name: Build (reusable)
on:
  workflow_call:
    inputs:
      java-version:
        required: false
        default: '25'
        type: string
      artifact-name:
        required: false
        default: app-jar
        type: string
      cache-read-only:
        description: Whether Gradle cache should be read-only.
        required: false
        default: 'false'
        type: string
    outputs:
      artifact-name:
        description: Name of the artifact produced by the build job.
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.echo.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Java
        uses: ./.github/actions/build-java
        with:
          java-version: ${{ inputs.java-version }}
          artifact-name: ${{ inputs.artifact-name }}
          cache-read-only: ${{ inputs.cache-read-only }}

      - name: Echo artifact name
        id: echo
        run: echo "name=${{ inputs.artifact-name }}" >> "$GITHUB_OUTPUT"